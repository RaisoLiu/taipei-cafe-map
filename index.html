  .cafe-item .tags { margin-top:2px; }
  .cafe-item .tag { display:inline-block; font-size:9px; padding:1px 5px; border-radius:3px; background:#ffffff10; color:#aaa; margin-right:3px; }

  .leaflet-popup-content { font-size:12px!important; line-height:1.55!important; margin:10px 14px!important; }
  .leaflet-popup-content .pop-name { color:#e8a87c; font-size:14px; font-weight:700; margin-bottom:2px; }
  .leaflet-popup-content .pop-area { color:#888; font-size:10px; margin-bottom:4px; }
  .leaflet-popup-content .pop-section { color:#aaa; font-size:10px; font-weight:600; margin-top:6px; margin-bottom:2px; text-transform:uppercase; letter-spacing:.5px; }
  .leaflet-popup-content .pop-row { margin:2px 0; }
  .leaflet-popup-content .pop-menu { color:#ccc; font-size:11px; }
  .leaflet-popup-content .pop-menu li { margin:1px 0; list-style:none; }
  .leaflet-popup-content .pop-menu li::before { content:'→ '; color:#e8a87c; }
  .leaflet-popup-content a { color:#79b8ff; text-decoration:none; }
  .leaflet-popup-content a:hover { text-decoration:underline; }
  .footer-note { padding:6px 12px; text-align:center; color:#555; font-size:9px; border-top:1px solid #282840; }

const map = L.map('map',{zoomControl:true}).setView([25.048,121.535],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',maxZoom:19
}).addTo(map);

const markers = {};
const markerLayer = L.layerGroup().addTo(map);

function createMarker(c) {
  const color = areaColors[c.area];
  const sz = 28;
  const html = `<div style="
    width:${sz}px;height:${sz}px;background:${color};
    border:2.5px solid rgba(255,255,255,0.9);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:${c.n>9?11:13}px;color:#12121f;
    box-shadow:0 2px 8px rgba(0,0,0,0.5);
  ">${c.n}</div>`;
  const icon = L.divIcon({html,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
  const m = L.marker([c.lat,c.lng],{icon});

  const tagsHtml = c.tags.map(t=>`<span style="display:inline-block;background:#ffffff15;padding:1px 6px;border-radius:3px;font-size:10px;color:#aaa;margin-right:3px;">${t}</span>`).join('');
  const menuHtml = c.menu.map(item=>`<li>${item}</li>`).join('');

  m.bindPopup(`
    <div class="pop-name">${c.n}. ${c.name}</div>
    <div class="pop-area">${c.area}</div>
    <div class="pop-row">🚇 ${c.station}　💰 ${c.price}</div>
    <div class="pop-row">🕐 ${c.hours}</div>
    <div style="margin:4px 0">${tagsHtml}</div>
    <div class="pop-section">🍽️ 必點推薦</div>
    <ul class="pop-menu">${menuHtml}</ul>
    <div style="margin-top:6px"><a href="${c.gmap}" target="_blank" rel="noopener">📍 Google Maps 導航</a></div>
  `,{maxWidth:300,minWidth:220});

  m.on('click',()=>highlightSidebar(c.n));
  markers[c.n] = m;
  return m;
}

// Filters
const filterDiv = document.getElementById('filters');
const allBtn = document.createElement('span');
allBtn.className = 'filter-btn active'; allBtn.textContent = '全部'; allBtn.dataset.area = 'all';
filterDiv.appendChild(allBtn);
Object.keys(areaColors).forEach(area => {
  const count = cafes.filter(c=>c.area===area).length;
  if(!count) return;
  const btn = document.createElement('span');
  btn.className = 'filter-btn'; btn.textContent = `${area} (${count})`;
  btn.dataset.area = area; btn.style.borderColor = areaColors[area]+'88';
  filterDiv.appendChild(btn);
});
let activeFilter = 'all';
filterDiv.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if(!btn) return;
  activeFilter = btn.dataset.area;
  filterDiv.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList(); renderMarkers();
});

function renderMarkers() {
  markerLayer.clearLayers();
  const visible = cafes.filter(c=> activeFilter==='all'||c.area===activeFilter);
  visible.forEach(c=> createMarker(c).addTo(markerLayer));
  if(visible.length) {
    const bounds = L.latLngBounds(visible.map(c=>[c.lat,c.lng]));
    map.fitBounds(bounds,{padding:[50,50],maxZoom:15});
  }
  document.getElementById('count').textContent = visible.length;
}

function renderList() {
  const listDiv = document.getElementById('list'); listDiv.innerHTML = '';
  const visible = cafes.filter(c=> activeFilter==='all'||c.area===activeFilter);
  const grouped = {};
  visible.forEach(c=>{ if(!grouped[c.area]) grouped[c.area]=[]; grouped[c.area].push(c); });
  const order = ['大安區','中山區','中正區','大同區','萬華區','松山區','士林區','南港區'];
  order.forEach(area=>{
    if(!grouped[area]) return;
    const grp = document.createElement('div'); grp.className = 'area-group';
    const lbl = document.createElement('div'); lbl.className = 'area-label';
    lbl.style.color = areaColors[area]; lbl.textContent = `${area}（${grouped[area].length}）`;
    grp.appendChild(lbl);
    grouped[area].forEach(c=>{
      const item = document.createElement('div'); item.className = 'cafe-item'; item.id = 'item-'+c.n;
      const tagsHtml = c.tags.map(t=>`<span class="tag">${t}</span>`).join('');
      item.innerHTML = `
        <div class="num" style="background:${areaColors[c.area]}">${c.n}</div>
        <div class="info">
          <div class="name">${c.name}</div>
          <div class="meta">🚇 ${c.station}　💰 ${c.price}</div>
          <div class="meta">🕐 ${c.hours}</div>
          <div class="tags">${tagsHtml}</div>
        </div>`;
      item.addEventListener('click',()=>{
        const m = markers[c.n]; if(m){map.setView([c.lat,c.lng],15);m.openPopup();}
        highlightSidebar(c.n);
      });
      grp.appendChild(item);
    });
    listDiv.appendChild(grp);
  });
}

function highlightSidebar(n) {
  document.querySelectorAll('.cafe-item').forEach(el=>el.classList.remove('highlight'));
  const el = document.getElementById('item-'+n);
  if(el){el.classList.add('highlight');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

renderList(); renderMarkers();
</script>
</body>
</html>
